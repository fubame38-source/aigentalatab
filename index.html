<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaTab AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

:root {
  --white: #ffffff;
  --gray-50: #f5f5f7;
  --gray-100: #e8e8ed;
  --gray-200: #d2d2d7;
  --gray-400: #86868b;
  --gray-600: #515154;
  --gray-900: #1d1d1f;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --green: #34c759;
}

body {
  font-family: -apple-system, "SF Pro Text", "SF Pro Display", BlinkMacSystemFont, sans-serif;
  background: var(--white);
  color: var(--gray-900);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* NAV */
nav {
  height: 48px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-brand {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.nav-brand-icon {
  width: 22px; height: 22px;
  background: var(--gray-900);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.nav-live {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--gray-400);
}
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* LAYOUT */
.app {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  min-width: 220px;
  border-right: 0.5px solid var(--gray-200);
  padding: 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--white);
}

.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-400);
  letter-spacing: 0.04em;
  padding: 12px 8px 6px;
}
.sidebar-label:first-child { padding-top: 0; }

.nav-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--gray-600);
  font-family: inherit;
  font-size: 13.5px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  text-align: left;
}
.nav-btn:hover { background: var(--gray-50); color: var(--gray-900); }
.nav-btn.active { background: var(--gray-50); color: var(--gray-900); font-weight: 500; }
.nav-btn-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.nav-btn.active .nav-btn-icon { background: var(--gray-900); }

.tags-wrap {
  padding: 6px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.tag {
  font-size: 11px;
  color: var(--gray-600);
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 5px;
  padding: 2px 7px;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  padding: 14px 28px;
  border-bottom: 0.5px solid var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.main-header-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  letter-spacing: -0.1px;
}
.main-header-sub {
  font-size: 12px;
  color: var(--gray-400);
  margin-top: 1px;
}
.model-tag {
  font-size: 11px;
  color: var(--gray-400);
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 20px;
  padding: 3px 10px;
}

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--gray-200) transparent;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
  padding: 40px;
  color: var(--gray-400);
}
.empty-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  margin-bottom: 8px;
}
.empty-title { font-size: 16px; font-weight: 600; color: var(--gray-900); }
.empty-desc { font-size: 13px; line-height: 1.6; max-width: 280px; }

/* MSG */
.msg { display: flex; gap: 10px; animation: in 0.18s ease; }
@keyframes in { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction: row-reverse; }

.avatar {
  width: 26px; height: 26px;
  border-radius: 7px;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-weight: 600;
}
.msg.ai .avatar { background: var(--gray-900); color: var(--white); }
.msg.user .avatar { background: var(--gray-100); color: var(--gray-600); font-size: 13px; }

.bubble {
  max-width: 65%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
}
.msg.ai .bubble {
  background: var(--gray-50);
  color: var(--gray-900);
  border-top-left-radius: 4px;
}
.msg.user .bubble {
  background: var(--blue);
  color: #fff;
  border-top-right-radius: 4px;
}
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; color: var(--gray-600); }

.dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
.dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--gray-400); animation: dot 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dot { 0%,80%,100%{transform:scale(1);opacity:0.4} 40%{transform:scale(1.3);opacity:1} }

/* INPUT */
.input-area {
  padding: 12px 28px 18px;
  border-top: 0.5px solid var(--gray-100);
  background: var(--white);
  flex-shrink: 0;
}

.chips {
  display: flex;
  gap: 5px;
  margin-bottom: 9px;
  flex-wrap: wrap;
}
.chip {
  font-size: 12px;
  color: var(--gray-600);
  background: var(--white);
  border: 0.5px solid var(--gray-200);
  border-radius: 20px;
  padding: 4px 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.1s;
}
.chip:hover { background: var(--gray-50); border-color: var(--gray-400); color: var(--gray-900); }

.input-box {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 12px;
  padding: 4px 4px 4px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-box:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
}
textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--gray-900);
  line-height: 1.5;
  resize: none;
  min-height: 34px;
  max-height: 120px;
  padding: 6px 0;
}
textarea::placeholder { color: var(--gray-400); }

.send {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--blue);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
  transition: background 0.1s, transform 0.1s, opacity 0.15s;
  flex-shrink: 0;
}
.send:hover { background: var(--blue-hover); }
.send:active { transform: scale(0.94); }
.send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }

@media (max-width: 580px) {
  .sidebar { display: none; }
  .messages { padding: 20px 16px; }
  .input-area { padding: 10px 16px 16px; }
  .bubble { max-width: 88%; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">🪵</div>
    AlaTab AI
  </div>
  <div class="nav-live">
    <div class="live-dot"></div>
    Aktif
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-label">Modüller</div>
    <button class="nav-btn active" onclick="setMode('content')" id="btn-content">
      <div class="nav-btn-icon">📸</div>
      İçerik Fikirleri
    </button>
    <button class="nav-btn" onclick="setMode('ads')" id="btn-ads">
      <div class="nav-btn-icon">🎯</div>
      Meta Reklam
    </button>
    <button class="nav-btn" onclick="setMode('biz')" id="btn-biz">
      <div class="nav-btn-icon">📈</div>
      İş Geliştirme
    </button>

    <div class="sidebar-label">Marka</div>
    <div class="tags-wrap">
      <span class="tag">Patentli taburet</span>
      <span class="tag">1M+ TL</span>
      <span class="tag">Instagram</span>
      <span class="tag">Meta Ads</span>
      <span class="tag">Shopify</span>
      <span class="tag">ElevenLabs</span>
    </div>
  </aside>

  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-header-title" id="m-title">İçerik Fikirleri</div>
        <div class="main-header-sub" id="m-sub">Viral Reels, Story ve TikTok konseptleri</div>
      </div>
      <div class="model-tag">Claude Sonnet</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="empty-icon">🪵</div>
        <div class="empty-title">AlaTab AI</div>
        <div class="empty-desc">Bir modül seç ve üretmeye başla.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="chips" id="chips">
        <button class="chip" onclick="chipSend(this)">🔥 Viral fikir üret</button>
        <button class="chip" onclick="chipSend(this)">📱 POV discovery</button>
        <button class="chip" onclick="chipSend(this)">🎬 ElevenLabs voiceover</button>
        <button class="chip" onclick="chipSend(this)">🪝 5 hook seçeneği</button>
      </div>
      <div class="input-box">
        <textarea id="inp" placeholder="Ne üretelim?" rows="1"
          onkeydown="handleKey(event)"
          oninput="resize(this)"></textarea>
        <button class="send" id="send-btn" onclick="send()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 11V3M7 3L3 7M7 3L11 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://alatab-agent.etsytulin.workers.dev/';

const CTX = `Sen AlaTab markasının özel AI asistanısın:
- Türkiye'nin patentli ahşap tuvalet taburesi markası (Squatty Potty'nin Türk versiyonu)
- 1 milyon TL+ ciro, Instagram organik + Meta Ads
- CPA ~275-355 TL, fiyat 1.799 TL, mağaza: alatab.com.tr
- Viral format: "sosyal keşif" POV — ürün adı söylenmiyor, el kamerası, hard cut, sessiz açılış <3sn, trend müzik, altyazı
- ElevenLabs voiceover, yüz/kişisel ses yok
- Hedef: 25-50 yaş Türkler, sağlık/doğallık ilgisi
- Faydalar: çömelme, hemoroit, kabızlık, kolon sağlığı`;

const M = {
  content: {
    title:'İçerik Fikirleri', sub:'Viral Reels, Story ve TikTok konseptleri',
    sys: CTX+'\n\nİÇERİK modülü: AlaTab için viral Reels/TikTok/Story fikirleri üret. Hook, sahne planı, ElevenLabs metni, müzik, neden viral olur. Türkçe.',
    chips:['🔥 Viral fikir üret','📱 POV discovery','🎬 ElevenLabs voiceover','🪝 5 hook seçeneği']
  },
  ads: {
    title:'Meta Reklam', sub:'Reklam metni, kreatif fikir ve kampanya stratejisi',
    sys: CTX+'\n\nREKLAM modülü: Meta reklam metni, kreatif konsept, kampanya önerisi. Primary text, başlık, CTA, hedef kitle. Dönüşüm odaklı, Türkçe.',
    chips:['✍️ Reklam metni yaz','🎨 Kreatif konsept','👥 Hedef kitle önerisi','📊 Kampanya yapısı']
  },
  biz: {
    title:'İş Geliştirme', sub:'Büyüme stratejisi, fırsatlar ve iş tavsiyeleri',
    sys: CTX+'\n\nİŞ GELİŞTİRME modülü: AlaTab için stratejik tavsiye. Yeni ürün, kanal, fırsat, operasyon. Pratik, uygulanabilir, Türkçe.',
    chips:['🚀 Bu hafta 3 öncelik','🆕 Yeni ürün fikirleri','📦 Bundle stratejisi','🔍 Rakip analizi']
  }
};

let cur='content', msgs=[], busy=false;

function setMode(m) {
  cur=m; msgs=[];
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  document.getElementById('m-title').textContent=M[m].title;
  document.getElementById('m-sub').textContent=M[m].sub;
  document.getElementById('chips').innerHTML=M[m].chips.map(c=>`<button class="chip" onclick="chipSend(this)">${c}</button>`).join('');
  document.getElementById('messages').innerHTML=`<div class="empty-state" id="empty"><div class="empty-icon">✦</div><div class="empty-title">${M[m].title}</div><div class="empty-desc">Hazır butonları kullan ya da istediğini yaz.</div></div>`;
}

function chipSend(el){ document.getElementById('inp').value=el.textContent.trim(); send(); }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(t){
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)/gm,'<strong style="font-size:13px;letter-spacing:.02em">$1</strong>')
    .replace(/^## (.+)/gm,'<strong style="font-size:14px">$1</strong>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:0.5px solid #e8e8ed;margin:10px 0">')
    .replace(/\n/g,'<br>');
}

function addMsg(role,text){
  const w=document.getElementById('empty'); if(w) w.remove();
  const el=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg '+role;
  d.innerHTML = role==='ai'
    ? `<div class="avatar">AT</div><div class="bubble">${fmt(text)}</div>`
    : `<div class="avatar">👤</div><div class="bubble">${esc(text)}</div>`;
  el.appendChild(d); el.scrollTop=el.scrollHeight;
}

function showTyping(){
  const w=document.getElementById('empty'); if(w) w.remove();
  const el=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg ai'; d.id='typing';
  d.innerHTML=`<div class="avatar">AT</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  el.appendChild(d); el.scrollTop=el.scrollHeight;
}
function rmTyping(){ const e=document.getElementById('typing'); if(e) e.remove(); }

async function send(){
  if(busy) return;
  const inp=document.getElementById('inp');
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; inp.style.height='auto';
  addMsg('user',text);
  msgs.push({role:'user',content:text});
  busy=true; document.getElementById('send-btn').disabled=true;
  showTyping();
  try {
    const res=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:msgs,mode:M[cur].sys})
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Hata oluştu.';
    msgs.push({role:'assistant',content:reply});
    rmTyping(); addMsg('ai',reply);
  } catch(e){
    rmTyping(); addMsg('ai','⚠️ Bağlantı hatası.');
  }
  busy=false; document.getElementById('send-btn').disabled=false;
}
</script>
</body>
</html>
