<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaTab AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e; --border: #2a2a2a;
    --accent: #c8a96e; --accent2: #e8c98e; --text: #f0ede8; --text2: #9a9590; --text3: #5a5550; --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: 0.04em; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; font-family: 'DM Sans', sans-serif; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-label { font-size: 12px; color: var(--text2); }
  main { flex: 1; display: flex; overflow: hidden; height: calc(100vh - 61px); }
  .sidebar { width: 260px; min-width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
  .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 20px 10px; }
  .mode-btn { display: flex; align-items: center; gap: 12px; padding: 13px 20px; cursor: pointer; transition: background 0.15s; border: none; background: none; width: 100%; text-align: left; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 14px; border-left: 3px solid transparent; }
  .mode-btn:hover { background: var(--surface2); color: var(--text); }
  .mode-btn.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }
  .mode-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .mode-btn.active .mode-icon { background: rgba(200,169,110,0.15); }
  .mode-name { font-weight: 500; font-size: 13px; }
  .mode-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .quick-context { padding: 0 20px; margin-top: 4px; }
  .context-tag { display: inline-block; background: rgba(200,169,110,0.1); color: var(--accent); border: 1px solid rgba(200,169,110,0.25); border-radius: 4px; font-size: 10px; padding: 3px 7px; margin: 2px 2px 2px 0; font-weight: 500; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .mode-header { padding: 18px 28px; border-bottom: 1px solid var(--border); }
  .mode-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .mode-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .msg { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .avatar.ai { background: rgba(200,169,110,0.15); color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 11px; }
  .avatar.user { background: var(--surface2); }
  .bubble { max-width: 72%; padding: 14px 16px; border-radius: 12px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; }
  .msg.ai .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }
  .msg.user .bubble { background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.25); color: var(--text); border-top-right-radius: 4px; }
  .bubble strong { color: var(--accent2); }
  .bubble em { color: var(--text2); font-style: italic; }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }
  .input-area { padding: 16px 28px 20px; border-top: 1px solid var(--border); background: var(--surface); }
  .quick-prompts { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .qp-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: 20px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .qp-btn:hover { border-color: var(--accent); color: var(--accent); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 12px 14px; resize: none; outline: none; min-height: 46px; max-height: 120px; transition: border 0.15s; line-height: 1.5; }
  textarea:focus { border-color: rgba(200,169,110,0.5); }
  textarea::placeholder { color: var(--text3); }
  .send-btn { width: 46px; height: 46px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0d0d0d; font-size: 18px; transition: background 0.15s, transform 0.1s; flex-shrink: 0; }
  .send-btn:hover { background: var(--accent2); transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text3); padding: 40px; text-align: center; }
  .welcome-icon { font-size: 40px; margin-bottom: 4px; }
  .welcome-title { font-family: 'Syne', sans-serif; font-size: 18px; color: var(--text2); font-weight: 700; }
  .welcome-desc { font-size: 13px; line-height: 1.7; max-width: 360px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
    .bubble { max-width: 90%; }
  }
</style>
</head>
<body>
<header>
  <div class="logo">AlaTab <span>AI Agent</span></div>
  <div><span class="status-dot"></span><span class="status-label">Aktif</span></div>
</header>
<main>
  <aside class="sidebar">
    <div class="sidebar-label">Modüller</div>
    <button class="mode-btn active" onclick="setMode('content')" id="btn-content">
      <div class="mode-icon">📸</div>
      <div class="mode-info"><div class="mode-name">İçerik Fikirleri</div><div class="mode-desc">Reel, Story, TikTok</div></div>
    </button>
    <button class="mode-btn" onclick="setMode('ads')" id="btn-ads">
      <div class="mode-icon">🎯</div>
      <div class="mode-info"><div class="mode-name">Meta Reklam</div><div class="mode-desc">Copy & görsel fikirleri</div></div>
    </button>
    <button class="mode-btn" onclick="setMode('biz')" id="btn-biz">
      <div class="mode-icon">📈</div>
      <div class="mode-info"><div class="mode-name">İş Geliştirme</div><div class="mode-desc">Strateji & büyüme</div></div>
    </button>
    <hr class="sidebar-divider">
    <div class="sidebar-label">AlaTab Bağlamı</div>
    <div class="quick-context">
      <span class="context-tag">Ahşap tuvalet taburesi</span>
      <span class="context-tag">Patentli</span>
      <span class="context-tag">1M+ TL ciro</span>
      <span class="context-tag">Instagram</span>
      <span class="context-tag">Meta Ads</span>
      <span class="context-tag">Shopify</span>
    </div>
  </aside>
  <div class="chat-area">
    <div class="mode-header">
      <div class="mode-title" id="mode-title">📸 İçerik Fikirleri</div>
      <div class="mode-subtitle" id="mode-subtitle">Viral Reels, Story ve video konseptleri üretiyor</div>
    </div>
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🪵</div>
        <div class="welcome-title">AlaTab AI Agent'ına hoş geldin</div>
        <div class="welcome-desc">Bir modül seçip aşağıdan mesaj yaz — ya da hazır butonlardan birini kullan.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="quick-prompts" id="quick-prompts">
        <button class="qp-btn" onclick="quickSend(this)">🔥 Bugün için viral fikir üret</button>
        <button class="qp-btn" onclick="quickSend(this)">📱 POV discovery formatı yaz</button>
        <button class="qp-btn" onclick="quickSend(this)">🎬 ElevenLabs için voiceover metni</button>
        <button class="qp-btn" onclick="quickSend(this)">🪝 5 farklı hook seçeneği</button>
      </div>
      <div class="input-row">
        <textarea id="user-input" placeholder="Ne üretelim?" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</main>
<script>
// Cloudflare Worker deploy ettikten sonra buraya URL'ini yapıştır
const WORKER_URL = 'WORKER_URL_BURAYA';

const ALATAB_CONTEXT = `Sen AlaTab markasının özel AI asistanısın. AlaTab hakkında şunları biliyorsun:
- Türkiye'nin patentli ahşap tuvalet taburesi markası (Squatty Potty'nin Türk versiyonu)
- 1 milyon TL+ ciro, Instagram'dan organik büyüme
- Meta Ads ile satış yapıyor, en iyi CPA ~275-355 TL, ürün fiyatı 1.799 TL
- Shopify mağazası: alatab.com.tr
- Viral içerik formatı: "sosyal keşif" POV (örn: "Kayınvalidenin banyosuna girdim bir de ne göreyim")
- Kural: ürün adı sesli söylenmiyor; el kamerası doğal his, hard cut, sessiz açılış <3 sn, trend müzik, altyazı
- ElevenLabs voiceover kullanılıyor, yüz ve kişisel ses kullanılmıyor
- Hedef kitle: Türk yetişkinler, 25-50 yaş, sağlık/doğallık ilgisi olanlar
- Ürün faydaları: çömelme pozisyonu, hemoroit önleme, kabızlık, kolon sağlığı
- İçerik tonları: merak uyandıran, mizahi, sağlık bilgisi, sosyal kanıt`;

const MODES = {
  content: {
    title: '📸 İçerik Fikirleri', subtitle: 'Viral Reels, Story ve video konseptleri üretiyor',
    system: ALATAB_CONTEXT + '\n\nŞu an İÇERİK FIKIRLERI modülündesin. Görevin: AlaTab için viral Instagram Reels, TikTok ve Story fikirleri üretmek. Her konseptte şunları ver: hook cümlesi, sahne sahne çekim planı, ElevenLabs için sesli metin, müzik önerisi, neden viral olur. Türkçe yaz.',
    prompts: ['🔥 Bugün için viral fikir üret','📱 POV discovery formatı yaz','🎬 ElevenLabs için voiceover metni','🪝 5 farklı hook seçeneği']
  },
  ads: {
    title: '🎯 Meta Reklam', subtitle: 'Reklam metni, kreatif fikir ve kampanya stratejisi',
    system: ALATAB_CONTEXT + '\n\nŞu an META REKLAM modülündesin. Görevin: AlaTab için Meta (Facebook/Instagram) reklam metinleri, kreatif konseptler ve kampanya fikirleri üretmek. Primary text, başlık, CTA, hedef kitle önerisi ver. Dönüşüm odaklı, net ve Türkçe yaz.',
    prompts: ['✍️ Yeni reklam metni yaz','🎨 Kreatif konsept öner','👥 Hedef kitle önerisi','📊 Kampanya yapısı öner']
  },
  biz: {
    title: '📈 İş Geliştirme', subtitle: 'Büyüme stratejisi, fırsatlar ve iş tavsiyeleri',
    system: ALATAB_CONTEXT + '\n\nŞu an İŞ GELİŞTİRME modülündesin. Görevin: AlaTab\'ın büyümesi için stratejik tavsiyeler vermek. Yeni ürün fikirleri, satış kanalları, pazar fırsatları, operasyon iyileştirmeleri yapabilirsin. Pratik ve uygulanabilir öneriler ver, Türkçe.',
    prompts: ['🚀 Bu hafta için 3 öncelik','🆕 Yeni ürün fikirleri','📦 Paket/bundle stratejisi','🔍 Rakip analizi yap']
  }
};

let currentMode = 'content', messages = [], isLoading = false;

function setMode(mode) {
  currentMode = mode; messages = [];
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');
  document.getElementById('mode-title').textContent = MODES[mode].title;
  document.getElementById('mode-subtitle').textContent = MODES[mode].subtitle;
  document.getElementById('quick-prompts').innerHTML = MODES[mode].prompts.map(p =>
    `<button class="qp-btn" onclick="quickSend(this)">${p}</button>`).join('');
  document.getElementById('messages').innerHTML = `<div class="welcome" id="welcome"><div class="welcome-icon">✨</div><div class="welcome-title">${MODES[mode].title} aktif</div><div class="welcome-desc">Hazır butonları kullan ya da istediğini yaz.</div></div>`;
}

function quickSend(btn) { document.getElementById('user-input').value = btn.textContent.trim(); sendMessage(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatText(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.*)/gm,'<strong style="font-size:15px;color:var(--accent2)">$1</strong>')
    .replace(/^## (.*)/gm,'<strong style="font-size:16px;color:var(--accent)">$1</strong>')
    .replace(/^---$/gm,'<hr style="border-color:var(--border);margin:8px 0">').replace(/\n/g,'<br>');
}
function addMessage(role, text) {
  const w = document.getElementById('welcome'); if (w) w.remove();
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = `msg ${role}`;
  div.innerHTML = role === 'ai'
    ? `<div class="avatar ai">AT</div><div class="bubble">${formatText(text)}</div>`
    : `<div class="avatar user">👤</div><div class="bubble">${escapeHtml(text)}</div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}
function showTyping() {
  const w = document.getElementById('welcome'); if (w) w.remove();
  const el = document.getElementById('messages');
  const div = document.createElement('div'); div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `<div class="avatar ai">AT</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}
function removeTyping() { const e = document.getElementById('typing'); if (e) e.remove(); }

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim(); if (!text) return;
  input.value = ''; input.style.height = 'auto';
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  isLoading = true; document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, mode: MODES[currentMode].system })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Bir hata oluştu, tekrar dene.';
    messages.push({ role: 'assistant', content: reply });
    removeTyping(); addMessage('ai', reply);
  } catch(err) {
    removeTyping();
    addMessage('ai', '⚠️ Bağlantı hatası. Worker URL\'ini kontrol et.');
  }
  isLoading = false; document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
