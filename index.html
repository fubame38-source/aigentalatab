<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlaTab AI</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
:root {
  --white: #ffffff;
  --gray-50: #f5f5f7;
  --gray-100: #e8e8ed;
  --gray-200: #d2d2d7;
  --gray-400: #86868b;
  --gray-600: #515154;
  --gray-900: #1d1d1f;
  --blue: #0071e3;
  --blue-hover: #0077ed;
  --green: #34c759;
}
body {
  font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, sans-serif;
  background: var(--white);
  color: var(--gray-900);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
nav {
  height: 48px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 22px;
  flex-shrink: 0;
  z-index: 100;
}
.nav-brand {
  font-size: 14px;
  font-weight: 600;
  color: var(--gray-900);
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.nav-brand-icon {
  width: 22px; height: 22px;
  background: var(--gray-900);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.nav-live {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--gray-400);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.app { flex: 1; display: flex; overflow: hidden; }
.sidebar {
  width: 220px; min-width: 220px;
  border-right: 0.5px solid var(--gray-200);
  padding: 16px 10px;
  display: flex; flex-direction: column; gap: 1px;
  background: var(--white);
  overflow-y: auto;
}
.sidebar-label {
  font-size: 11px; font-weight: 600;
  color: var(--gray-400);
  letter-spacing: 0.04em;
  padding: 10px 8px 5px;
}
.sidebar-label:first-child { padding-top: 2px; }
.nav-btn {
  width: 100%;
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px;
  border-radius: 8px;
  border: none; background: transparent;
  color: var(--gray-600);
  font-family: inherit; font-size: 13px;
  cursor: pointer;
  transition: background 0.1s, color 0.1s;
  text-align: left;
}
.nav-btn:hover { background: var(--gray-50); color: var(--gray-900); }
.nav-btn.active { background: var(--gray-50); color: var(--gray-900); font-weight: 500; }
.nav-btn-icon {
  width: 26px; height: 26px;
  border-radius: 6px; background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}
.nav-btn.active .nav-btn-icon { background: var(--gray-900); }
.tags-wrap { padding: 5px 8px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  font-size: 11px; color: var(--gray-600);
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 5px; padding: 2px 7px;
}
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  padding: 13px 28px;
  border-bottom: 0.5px solid var(--gray-100);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.main-header-title { font-size: 14px; font-weight: 600; color: var(--gray-900); letter-spacing: -0.1px; }
.main-header-sub { font-size: 12px; color: var(--gray-400); margin-top: 1px; }
.model-tag {
  font-size: 11px; color: var(--gray-400);
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 20px; padding: 3px 10px;
}
.messages {
  flex: 1; overflow-y: auto;
  padding: 28px; display: flex; flex-direction: column; gap: 20px;
  scrollbar-width: thin; scrollbar-color: var(--gray-200) transparent;
}
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; text-align: center; padding: 40px;
}
.empty-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--gray-50); border: 0.5px solid var(--gray-200);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 6px;
}
.empty-title { font-size: 16px; font-weight: 600; color: var(--gray-900); }
.empty-desc { font-size: 13px; line-height: 1.6; color: var(--gray-400); max-width: 280px; }
.msg { display: flex; gap: 10px; animation: in 0.18s ease; }
@keyframes in { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 26px; height: 26px; border-radius: 7px;
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600;
}
.msg.ai .avatar { background: var(--gray-900); color: var(--white); }
.msg.user .avatar { background: var(--gray-100); color: var(--gray-600); font-size: 13px; }
.bubble {
  max-width: 66%; padding: 10px 14px; border-radius: 14px;
  font-size: 14px; line-height: 1.65; white-space: pre-wrap;
}
.msg.ai .bubble { background: var(--gray-50); color: var(--gray-900); border-top-left-radius: 4px; }
.msg.user .bubble { background: var(--blue); color: #fff; border-top-right-radius: 4px; }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; color: var(--gray-600); }
.dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
.dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--gray-400); animation: dot 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: 0.15s; }
.dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dot { 0%,80%,100%{transform:scale(1);opacity:0.4} 40%{transform:scale(1.3);opacity:1} }
.input-area {
  padding: 12px 28px 18px;
  border-top: 0.5px solid var(--gray-100);
  background: var(--white); flex-shrink: 0;
}
.chips { display: flex; gap: 5px; margin-bottom: 9px; flex-wrap: wrap; }
.chip {
  font-size: 12px; color: var(--gray-600);
  background: var(--white);
  border: 0.5px solid var(--gray-200);
  border-radius: 20px; padding: 4px 11px;
  cursor: pointer; font-family: inherit;
  transition: all 0.1s; white-space: nowrap;
}
.chip:hover { background: var(--gray-50); border-color: var(--gray-400); color: var(--gray-900); }
.input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--gray-50);
  border: 0.5px solid var(--gray-200);
  border-radius: 12px;
  padding: 4px 4px 4px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input-box:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
}
textarea {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 14px; color: var(--gray-900);
  line-height: 1.5; resize: none;
  min-height: 34px; max-height: 120px; padding: 6px 0;
}
textarea::placeholder { color: var(--gray-400); }
.send {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--blue); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; transition: background 0.1s, transform 0.1s, opacity 0.15s;
  flex-shrink: 0;
}
.send:hover { background: var(--blue-hover); }
.send:active { transform: scale(0.94); }
.send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
@media (max-width: 580px) {
  .sidebar { display: none; }
  .messages { padding: 18px 16px; }
  .input-area { padding: 10px 16px 16px; }
  .bubble { max-width: 88%; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-brand-icon">🪵</div>
    AlaTab AI
  </div>
  <div class="nav-live">
    <div class="live-dot"></div>
    Aktif
  </div>
</nav>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-label">İçerik</div>
    <button class="nav-btn active" onclick="setMode('content')" id="btn-content">
      <div class="nav-btn-icon">📸</div>İçerik & Hook
    </button>

    <div class="sidebar-label">Reklam & Satış</div>
    <button class="nav-btn" onclick="setMode('ads')" id="btn-ads">
      <div class="nav-btn-icon">🎯</div>Meta Reklam
    </button>
    <button class="nav-btn" onclick="setMode('shopify')" id="btn-shopify">
      <div class="nav-btn-icon">🛍️</div>Shopify Sayfası
    </button>

    <div class="sidebar-label">Büyüme</div>
    <button class="nav-btn" onclick="setMode('seo')" id="btn-seo">
      <div class="nav-btn-icon">🔍</div>SEO & Google
    </button>
    <button class="nav-btn" onclick="setMode('competitor')" id="btn-competitor">
      <div class="nav-btn-icon">🧭</div>Rakip Analizi
    </button>
    <button class="nav-btn" onclick="setMode('product')" id="btn-product">
      <div class="nav-btn-icon">💡</div>Yeni Ürün
    </button>
    <button class="nav-btn" onclick="setMode('biz')" id="btn-biz">
      <div class="nav-btn-icon">📈</div>İş Geliştirme
    </button>

    <div class="sidebar-label">Marka</div>
    <div class="tags-wrap">
      <span class="tag">Patentli taburet</span>
      <span class="tag">1M+ TL</span>
      <span class="tag">Instagram</span>
      <span class="tag">Meta Ads</span>
      <span class="tag">Shopify</span>
      <span class="tag">ElevenLabs</span>
    </div>
  </aside>

  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-header-title" id="m-title">İçerik & Hook Formülleri</div>
        <div class="main-header-sub" id="m-sub">Viral Reels, TikTok ve hook fikirleri</div>
      </div>
      <div class="model-tag">Claude Sonnet</div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="empty-icon">🪵</div>
        <div class="empty-title">AlaTab AI</div>
        <div class="empty-desc">Sol menüden bir modül seç ve üretmeye başla.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="chips" id="chips">
        <button class="chip" onclick="chipSend(this)">🔥 Viral fikir üret</button>
        <button class="chip" onclick="chipSend(this)">📱 POV discovery formatı</button>
        <button class="chip" onclick="chipSend(this)">🎬 ElevenLabs voiceover</button>
        <button class="chip" onclick="chipSend(this)">🪝 5 hook seçeneği</button>
      </div>
      <div class="input-box">
        <textarea id="inp" placeholder="Ne üretelim?" rows="1"
          onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
        <button class="send" id="send-btn" onclick="send()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 11V3M7 3L3 7M7 3L11 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://alatab-agent.etsytulin.workers.dev/';

const CTX = `Sen AlaTab markasının özel AI asistanısın. AlaTab hakkında her şeyi biliyorsun:
MARKA: Türkiye'nin patentli ahşap tuvalet taburesi. Squatty Potty'nin Türk versiyonu. alatab.com.tr
FİNANS: 1M+ TL ciro. Ürün fiyatı 1.799 TL. Meta Ads CPA ~275-355 TL.
PLATFORM: Shopify (Savor teması). Instagram organik + Meta Ads ile büyüme.
VİRAL FORMAT: "Sosyal keşif" POV — örn: "Kayınvalidenin banyosuna girdim bir de ne göreyim". Ürün adı sesli söylenmiyor. El kamerası doğal his. Hard cut. Sessiz açılış <3sn. Trend müzik. Altyazı zorunlu. ElevenLabs voiceover. Yüz/kişisel ses kullanılmıyor.
HEDEF KİTLE: 25-50 yaş Türkler. Sağlık ve doğallık ilgisi. Özellikle anneler ve ev hanımları.
ÜRÜN FAYDALARI: Çömelme pozisyonu, hemoroit önleme, kabızlık giderme, kolon sağlığı, daha kısa tuvalet süresi.
SEO DURUMU: Google Business Profile yok. Meta description zayıf. Schema markup yok. Skor 42/100.
REKABET: Squatty Potty Türkiye'de yok. Türk rakipler plastik/ucuz ürünler satıyor. AlaTab ahşap + patent ile farklılaşıyor.
ÖNEMLİ SORUNLAR: Review count tutarsız (1300+ iddia vs 19 görünen). Bazı AI-generated testimonialler var. TikTok/YouTube sosyal linkler kırık.`;

const M = {
  content: {
    title: 'İçerik & Hook Formülleri',
    sub: 'Viral Reels, TikTok ve hook fikirleri',
    sys: CTX + `\n\nİÇERİK & HOOK modülündesin. Görevin:
- AlaTab için viral Instagram Reels ve TikTok fikirleri üret
- Kanıtlanmış "sosyal keşif" POV formatını kullan
- Her konseptte şunları ver: Hook cümlesi (ilk 3 saniye), sahne sahne çekim planı, ElevenLabs için sesli metin, müzik türü önerisi, neden viral olur analizi
- Hook formüllerini şu kategorilerde üret: merak/şok, sosyal kanıt, problem-çözüm, karşılaştırma, eğitim
- Türkçe yaz. Pratik ve çekilebilir ol.`,
    chips: ['🔥 Bugün için viral fikir', '📱 POV discovery formatı', '🎬 ElevenLabs voiceover metni', '🪝 5 farklı hook formülü', '😱 Şok/merak formatı', '👨‍👩‍👧 Aile/sosyal kanıt formatı']
  },
  ads: {
    title: 'Meta Reklam',
    sub: 'Facebook/Instagram reklam metni ve kampanya stratejisi',
    sys: CTX + `\n\nMETA REKLAM modülündesin. Görevin:
- AlaTab için yüksek dönüşümlü reklam metinleri yaz
- Primary text (3 versiyon: kısa/orta/uzun), başlık, CTA öner
- Hedef kitle segmentleri: sağlık bilinci, ebeveynler, yaşlı bakımı, hemoroit/kabızlık sorunu yaşayanlar
- CBO yapısı: 1 CBO + 4-6 kreatif + 1 ABO test öner
- Mevcut en iyi CPA: 275-355 TL (1.799 TL ürün). Bu benchmarkı aşmayı hedefle.
- Viral organik Reels'i ücretli reklama dönüştürme taktikleri ver
- Türkçe yaz.`,
    chips: ['✍️ 3 versiyon reklam metni', '🎯 Hedef kitle segmentleri', '📊 CBO kampanya yapısı', '🔄 Organik → Ücretli dönüşüm', '💰 Bütçe optimizasyonu', '📱 Reel reklam scripti']
  },
  shopify: {
    title: 'Shopify Ürün Sayfası',
    sub: 'Dönüşüm artırma ve sayfa optimizasyonu',
    sys: CTX + `\n\nSHOPIFY ÜRÜN SAYFASI modülündesin. Görevin:
- alatab.com.tr ürün sayfasını optimize et
- Bilinen sorunlar: Review count tutarsızlığı (1300+ iddia vs 19 görünen), AI-generated testimonialler, kırık sosyal linkler, sticky ATC yok, bundle/upsell yok
- Ürün açıklaması, başlık, bullet points, FAQ bölümü yaz
- Sosyal kanıt stratejisi öner (gerçek müşteri yorumları nasıl toplanır)
- Upsell/bundle fikirleri öner (örn: 2'li paket, hediye seti)
- Shopify Savor teması için CSS/kod önerileri ver
- Türkçe yaz, dönüşüm odaklı ol.`,
    chips: ['📝 Ürün açıklaması yaz', '⭐ Review stratejisi', '📦 Bundle/upsell fikirleri', '🛒 Sticky ATC önerisi', '❓ FAQ bölümü yaz', '📸 Görsel sıralaması öner']
  },
  seo: {
    title: 'SEO & Google Görünürlüğü',
    sub: 'Organik trafik ve Google sıralaması',
    sys: CTX + `\n\nSEO & GOOGLE modülündesin. Görevin:
- alatab.com.tr için SEO stratejisi geliştir (mevcut skor: 42/100)
- Kritik eksikler: Google Business Profile yok, meta description zayıf, schema markup yok, Türkçe keyword coverage zayıf
- Hedef keywordler: "klozet taburesi", "tuvalet taburesi", "kabızlık çözümü", "hemoroit önleme", "Squatty Potty Türkiye"
- Blog içerik fikirleri üret (SEO odaklı)
- Meta title/description yaz
- Schema markup kodu ver (product, review, FAQ)
- Google Business Profile optimizasyon önerileri
- Türkçe yaz, teknik ama anlaşılır ol.`,
    chips: ['🔑 Keyword araştırması', '📝 Meta title/description yaz', '📖 Blog yazısı fikri', '🏪 Google Business önerileri', '🏗️ Schema markup kodu', '📊 İçerik takvimi']
  },
  competitor: {
    title: 'Rakip & Pazar Analizi',
    sub: 'Türkiye tuvalet taburesi pazarı ve rekabet',
    sys: CTX + `\n\nRAKİP & PAZAR ANALİZİ modülündesin. Görevin:
- Türkiye tuvalet taburesi/klozet taburesi pazarını analiz et
- AlaTab'ın rakipleri: plastik ucuz tabureler, ithal ürünler, Trendyol/Amazon satıcıları
- AlaTab'ın güçlü yönleri: patent, ahşap kalite, 1M+ TL ciro kanıtı, viral içerik yetkinliği
- Fırsatlar: Squatty Potty Türkiye'de yok, sağlık bilinci artıyor, yaşlı nüfus büyüyor
- Fiyat konumlandırması analizi (1.799 TL vs rakipler)
- Yeni pazar segmentleri öner (B2B: oteller, hastaneler, huzurevleri)
- Türkçe yaz, veri odaklı ol.`,
    chips: ['🏆 Rakip karşılaştırması', '📈 Pazar fırsat analizi', '💎 Farklılaştırma stratejisi', '🏢 B2B fırsatları', '💰 Fiyat konumlandırması', '🌍 İhracat fırsatları']
  },
  product: {
    title: 'Yeni Ürün Fikirleri',
    sub: 'Ürün genişletme ve yeni konseptler',
    sys: CTX + `\n\nYENİ ÜRÜN FİKİRLERİ modülündesin. Görevin:
- AlaTab markası altında yeni ürün fikirleri geliştir
- Bilinen fırsatlar: tuvalet öncesi koku spreyi (Poo-Pourri benzeri), manifestasyon kartları, ahşap/poliüretan dekoratif ürünler
- Her ürün için şunları ver: konsept, hedef kitle, fiyat önerisi, üretim kolaylığı (1-5), viral potansiyel (1-5), mevcut müşteri tabanına uyum
- Shopify'da kolayca eklenebilir ürünleri önceliklendir
- Türkiye pazarına özel fırsatları değerlendir
- Türkçe yaz, pratik ve gerçekçi ol.`,
    chips: ['🆕 5 yeni ürün fikri', '🧴 Koku spreyi konsepti', '🎴 Manifestasyon kartı', '🪵 Ahşap ürün fikirleri', '📦 Bundle paket önerileri', '🚀 En hızlı lansman hangisi']
  },
  biz: {
    title: 'İş Geliştirme',
    sub: 'Büyüme stratejisi ve genel iş tavsiyeleri',
    sys: CTX + `\n\nİŞ GELİŞTİRME modülündesin. Görevin:
- AlaTab'ın genel büyüme stratejisi için tavsiye ver
- Haftalık/aylık öncelikler belirle
- Operasyon, finans, müşteri hizmetleri iyileştirmeleri öner
- Yeni satış kanalları: Trendyol, Hepsiburada, Amazon TR öner
- Influencer/UGC stratejisi geliştir
- Mevcut 1M+ TL ciroyu 3M TL'ye çıkarmak için roadmap çiz
- Türkçe yaz, direkt ve uygulanabilir ol.`,
    chips: ['🚀 Bu hafta 3 öncelik', '📅 Aylık büyüme planı', '🛒 Yeni satış kanalları', '🤝 Influencer stratejisi', '📊 3M TL ciro roadmap', '⚡ Hızlı kazanımlar']
  }
};

let cur = 'content', msgs = [], busy = false;

function setMode(m) {
  cur = m; msgs = [];
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  document.getElementById('m-title').textContent = M[m].title;
  document.getElementById('m-sub').textContent = M[m].sub;
  document.getElementById('chips').innerHTML = M[m].chips.map(c =>
    `<button class="chip" onclick="chipSend(this)">${c}</button>`).join('');
  document.getElementById('messages').innerHTML = `<div class="empty-state" id="empty">
    <div class="empty-icon">${getIcon(m)}</div>
    <div class="empty-title">${M[m].title}</div>
    <div class="empty-desc">${M[m].sub}</div>
  </div>`;
}

function getIcon(m) {
  const icons = {content:'📸',ads:'🎯',shopify:'🛍️',seo:'🔍',competitor:'🧭',product:'💡',biz:'📈'};
  return icons[m] || '✦';
}

function chipSend(el) { document.getElementById('inp').value = el.textContent.trim(); send(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(t) {
  return esc(t)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)/gm,'<strong style="font-size:13px;letter-spacing:.01em">$1</strong>')
    .replace(/^## (.+)/gm,'<strong style="font-size:14px">$1</strong>')
    .replace(/^---$/gm,'<hr style="border:none;border-top:0.5px solid #e8e8ed;margin:10px 0">')
    .replace(/\n/g,'<br>');
}

function addMsg(role, text) {
  const w = document.getElementById('empty'); if (w) w.remove();
  const el = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'msg ' + role;
  d.innerHTML = role === 'ai'
    ? `<div class="avatar">AT</div><div class="bubble">${fmt(text)}</div>`
    : `<div class="avatar">👤</div><div class="bubble">${esc(text)}</div>`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const w = document.getElementById('empty'); if (w) w.remove();
  const el = document.getElementById('messages');
  const d = document.createElement('div'); d.className = 'msg ai'; d.id = 'typing';
  d.innerHTML = `<div class="avatar">AT</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function rmTyping() { const e = document.getElementById('typing'); if (e) e.remove(); }

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', text);
  msgs.push({ role: 'user', content: text });
  busy = true; document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs, mode: M[cur].sys })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Hata oluştu.';
    msgs.push({ role: 'assistant', content: reply });
    rmTyping(); addMsg('ai', reply);
  } catch(e) {
    rmTyping(); addMsg('ai', '⚠️ Bağlantı hatası.');
  }
  busy = false; document.getElementById('send-btn').disabled = false;
}
</script>
